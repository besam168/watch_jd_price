<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Car Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <h1>Neon Car Dodge</h1>
        <p class="hint">← / → move · Space start / restart</p>
      </header>

      <section class="hud" aria-label="game hud">
        <div class="hud-card">
          <span class="hud-label">Score</span>
          <span id="score" class="hud-value">0</span>
        </div>
      </section>

      <div id="gameArea" class="game-area">
        <div class="skyline"></div>
        <div class="road-glow"></div>
        <div id="player" class="car player"></div>

        <div id="overlay" class="overlay" data-state="start">
          <h2 id="overlayTitle">Ready to Drive?</h2>
          <p id="overlayText">Press Space to start</p>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
